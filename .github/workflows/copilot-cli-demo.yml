name: Copilot CLI Demo

on:
  # Trigger on push to main branch
  push:
    branches: [ main ]
  # Trigger on pull requests to main branch
  pull_request:
    branches: [ main ]
  # Allow manual triggering from GitHub UI
  workflow_dispatch:

jobs:
  copilot-cli-demo:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Install Copilot CLI
      run: |
        # Install Copilot CLI via npm (requires Node.js 22+ and npm 10+)
        npm install -g @github/copilot
        
        # Verify installation
        copilot --version
        
    - name: Verify GitHub Authentication
      env:
        GITHUB_TOKEN: ${{ secrets.GH_COPILOT_CLI }}
      run: |
        # Check if we can authenticate with GitHub
        echo "Checking GitHub authentication..."
        if [ -z "$GITHUB_TOKEN" ]; then
          echo "ERROR: GH_COPILOT_CLI secret is not set"
          exit 1
        else
          echo "GH_COPILOT_CLI token is available"
        fi
        
    - name: Run Copilot CLI in silent mode
      env:
        GITHUB_TOKEN: ${{ secrets.GH_COPILOT_CLI }}
      run: |
        # Create a simple test file for Copilot to work with
        echo "console.log('Hello, World!');" > test.js
        
        # Set up trusted directory to avoid interactive prompts
        mkdir -p ~/.config
        echo '{"trustedDirs": ["'"$(pwd)"'"]}' > ~/.config/copilot-config.json
        
        # Verify token is available for Copilot
        echo "Using GH_COPILOT_CLI secret for authentication"
        
        # Run Copilot CLI with a dummy prompt in non-interactive mode
        copilot --prompt "Explain what the test.js file does" --allow-all-tools
        
    - name: Display results
      run: |
        echo "Copilot CLI demo completed successfully!"
        echo "Repository contents:"
        ls -la